name: Build Executables

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  APP_NAME: Harmony
  APP_VERSION: 1.0.0

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libpulse0 \
            libxcb1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libfuse2 \
            libasound2 \
            ffmpeg \
            upx

      - name: Build AppImage
        env:
          APP_VERSION: ${{ github.ref_name || env.APP_VERSION }}
        run: |
          chmod +x release.sh
          ./release.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-linux
          path: |
            dist/*.AppImage
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf /Library/Developer/CoreSimulator
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/homebrew
          sudo rm -rf /Users/runner/hostedtoolcache
          rm -rf ~/.cache/pip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Build executable
        run: |
          chmod +x build.py build_macos.sh
          uv run python build.py macos

      - name: Create app bundle
        run: |
          if [ ! -d "dist/Harmony.app" ]; then
            mkdir -p dist/Harmony.app/Contents/MacOS
            mkdir -p dist/Harmony.app/Contents/Resources

            cp dist/Harmony dist/Harmony.app/Contents/MacOS/

            cat > dist/Harmony.app/Contents/Info.plist << EOF
              <?xml version="1.0" encoding="UTF-8"?>
              <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
              <plist version="1.0">
              <dict>
              <key>CFBundleExecutable</key>
              <string>Harmony</string>
              <key>CFBundleIdentifier</key>
              <string>com.harmonyplayer.harmony</string>
              <key>CFBundleName</key>
              <string>Harmony</string>
              <key>CFBundleVersion</key>
              <string>${{ env.APP_VERSION }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ env.APP_VERSION }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.14</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              </dict>
              </plist>
          EOF
          fi

          cd dist
          zip -r Harmony-${{ env.APP_VERSION }}-macos.zip Harmony.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-macos
          path: |
            dist/Harmony.app
            dist/Harmony-${{ env.APP_VERSION }}-macos.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Build executable
        run: |
          $env:PATH = "C:\Windows\System32;" + $env:PATH
          uv run python build.py windows

      - name: Create portable ZIP
        run: |
          mkdir -p dist/Harmony-portable
          cp dist/Harmony.exe dist/Harmony-portable/
          cp -r translations dist/Harmony-portable/ 2>$null || true

          Set-Content -Path "dist/Harmony-portable/README.txt" -Value @"
          Harmony v${{ env.APP_VERSION }}

          This is a portable version. No installation required.
          Just run Harmony.exe

          System Requirements:
          - Windows 10 or later
          - Visual C++ Redistributable 2015-2022
          "@

          Compress-Archive -Path "dist/Harmony-portable/*" -DestinationPath "dist/Harmony-${{ env.APP_VERSION }}-portable.zip" -Force
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-windows
          path: |
            dist/Harmony.exe
            dist/Harmony-${{ env.APP_VERSION }}-portable.zip
          retention-days: 30

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.AppImage" -exec cp {} release-assets/ \;
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          find artifacts -name "*.exe" -exec cp {} release-assets/ \;
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
