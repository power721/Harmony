name: Build Executables

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  APP_NAME: Harmony

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libgl1 \
          libegl1 \
          libopengl0 \
          libglib2.0-0 \
          libmpv-dev \
          libpulse0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-xfixes0 \
          libxcb-xinerama0 \
          libxcb-xkb1 \
          libxcb-cursor0 \
          libxkbcommon-x11-0 \
          libfuse2 \
          xvfb \
          binutils \
          build-essential \
          cmake \
          extra-cmake-modules \
          libfcitx5core-dev \
          libfcitx5utils-dev \
          libgl1-mesa-dev \
          libxkbcommon-dev \
          libwayland-dev \
          wayland-protocols \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          gstreamer1.0-plugins-bad \
          gstreamer1.0-plugins-ugly \
          gstreamer1.0-libav \
          gstreamer1.0-tools \
          libgstreamer1.0-0 \
          libgstreamer-plugins-base1.0-0

      - name: Get Qt version for cache key
        id: qt-version
        run: |
          uv sync --frozen
          QT_VERSION=$(uv run python -c "from PySide6.QtCore import QLibraryInfo; print(QLibraryInfo.version().toString())")
          echo "version=$QT_VERSION" >> $GITHUB_OUTPUT
          echo "Qt version: $QT_VERSION"

      - name: Cache fcitx5 Qt6 plugin
        id: cache-fcitx5
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/fcitx5-qt6-plugin
          key: fcitx5-qt6-${{ steps.qt-version.outputs.version }}-${{ runner.os }}

      - name: Build or restore fcitx5 Qt6 plugin
        run: |
          # 获取 PySide6 插件路径
          PYSIDE_PLUGIN_PATH=$(uv run python -c "from PySide6.QtCore import QLibraryInfo; print(QLibraryInfo.path(QLibraryInfo.LibraryPath.PluginsPath))")
          PLUGIN_DEST="$PYSIDE_PLUGIN_PATH/platforminputcontexts/"

          # 检查缓存
          CACHED_PLUGIN="$HOME/.cache/fcitx5-qt6-plugin/libfcitx5platforminputcontextplugin.so"

          if [ -f "$CACHED_PLUGIN" ]; then
            echo "==> Restoring fcitx5 plugin from cache"
            mkdir -p "$PLUGIN_DEST"
            cp "$CACHED_PLUGIN" "$PLUGIN_DEST/"
            echo "Plugin restored from cache"
          else
            echo "==> Building fcitx5 Qt6 plugin"
            chmod +x scripts/build_fcitx5_qt6.sh
            ./scripts/build_fcitx5_qt6.sh

            # 缓存编译结果
            mkdir -p "$HOME/.cache/fcitx5-qt6-plugin"
            cp "$PLUGIN_DEST/libfcitx5platforminputcontextplugin.so" "$HOME/.cache/fcitx5-qt6-plugin/"
            echo "Plugin cached for future builds"
          fi

          # 验证插件存在
          ls -la "$PLUGIN_DEST"

      - name: Generate Qt plugin whitelist (Dynamic Analysis)
        run: |
          uv sync --frozen
          mkdir -p build_analysis
          
          echo "==> Running app in virtual framebuffer to sniff plugins..."
          # 开启 QT_DEBUG_PLUGINS 并通过 xvfb 模拟显示
          export QT_DEBUG_PLUGINS=1
          export QT_QPA_PLATFORM=xcb
          
          xvfb-run uv run python << 'EOF' 2> qt_plugins.log
          import sys
          from PySide6.QtWidgets import QApplication
          from PySide6.QtMultimedia import QMediaPlayer, QAudioOutput
          from PySide6.QtCore import QUrl, QTimer
          
          app = QApplication(sys.argv)
          player = QMediaPlayer()
          audio = QAudioOutput()
          player.setAudioOutput(audio)
          # 触发插件加载
          player.setSource(QUrl("https://www.w3schools.com/html/horse.mp3")) 
          
          # 运行 3 秒后自动退出
          QTimer.singleShot(3000, app.quit)
          app.exec()
          EOF
          
          echo "==> Extracting whitelist..."
          python << 'EOF'
          import re
          plugins = set()
          try:
              with open("qt_plugins.log", "r", errors="ignore") as f:
                  for line in f:
                      if "loaded library" in line and "plugins" in line:
                          path = line.split('"')[1]
                          rel = path.split("plugins/")[-1]
                          plugins.add(rel)
          except Exception as e:
              print(f"Warning during log parsing: {e}")
          
          # 强制补充核心多媒体插件
          plugins.update([
              "platforms/libqxcb.so",
              "multimedia/libqtmedia_ffmpeg.so",
              "audio/libqtaudio_alsa.so",
              "audio/libqtaudio_pulse.so"
          ])
          
          with open("build_analysis/qt_plugins_whitelist.txt", "w") as f:
              for p in sorted(plugins):
                  f.write(p + "\n")
          print(f"Total plugins whitelisted: {len(plugins)}")
          EOF

      - name: Build AppImage
        env:
          APP_VERSION: ${{ github.ref_name || 'nightly' }}
        run: |
          chmod +x release.sh
          ./release.sh

      - name: Create portable tarball
        run: |
          VERSION=${{ github.ref_name || 'nightly' }}
          cd dist
          mkdir -p Harmony-portable
          cp -r Harmony/* Harmony-portable/
          tar -czvf Harmony-$VERSION-linux-portable.tar.gz Harmony-portable

      - name: Analyze bundle size
        run: |
          echo "==> Bundle size overview"

          du -sh dist/* || true

          echo ""
          echo "==> Top 20 largest files"
          find dist/$APP_NAME -type f -exec du -h {} + 2>/dev/null \
            | sort -hr | head -n 20

          echo ""
          echo "==> _internal breakdown"
          du -sh dist/$APP_NAME/_internal/* 2>/dev/null || true

          echo ""
          echo "==> Qt plugins breakdown"
          du -sh dist/$APP_NAME/_internal/PySide6/Qt/plugins/* 2>/dev/null || true

          echo ""
          echo "==> lib directory breakdown"
          du -sh dist/$APP_NAME/_internal/lib/* 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-linux-build
          path: |
            dist/*.AppImage
            dist/*.tar.gz
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf /Library/Developer/CoreSimulator
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /Users/runner/hostedtoolcache
          rm -rf ~/.cache/pip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Install system dependencies
        run: |
          brew update
          brew install mpv

      - name: Build executable
        run: |
          chmod +x build.py build_macos.sh
          uv run python build.py macos

      - name: Create app bundle
        env:
          APP_VERSION: ${{ github.ref_name || 'nightly' }}
        run: |
          if [ ! -d "dist/Harmony.app" ]; then
            mkdir -p dist/Harmony.app/Contents/MacOS
            mkdir -p dist/Harmony.app/Contents/Resources

            cp dist/Harmony dist/Harmony.app/Contents/MacOS/

            cat > dist/Harmony.app/Contents/Info.plist << EOF
              <?xml version="1.0" encoding="UTF-8"?>
              <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
              <plist version="1.0">
              <dict>
              <key>CFBundleExecutable</key>
              <string>Harmony</string>
              <key>CFBundleIdentifier</key>
              <string>com.harmonyplayer.harmony</string>
              <key>CFBundleName</key>
              <string>Harmony</string>
              <key>CFBundleVersion</key>
              <string>${APP_VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${APP_VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.14</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              </dict>
              </plist>
          EOF
          fi

          cd dist
          zip -r Harmony-${APP_VERSION}-macos.zip Harmony.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-macos
          path: |
            dist/Harmony.app
            dist/Harmony-*-macos.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Install mpv runtime
        run: |
          choco install mpv -y
          Get-Command mpv

      - name: Build executable
        env:
          APP_VERSION: ${{ github.ref_name || 'nightly' }}
        run: |
          $env:PATH = "C:\Windows\System32;" + $env:PATH
          uv run python build.py windows

      - name: Create portable zip
        env:
          APP_VERSION: ${{ github.ref_name || 'nightly' }}
        run: |
          # Create portable version
          Compress-Archive -Path "dist/Harmony.exe" -DestinationPath "dist/Harmony-${env:APP_VERSION}-windows.zip"

          # Create versioned exe
          Rename-Item -Path "dist/Harmony.exe" -NewName "Harmony-${env:APP_VERSION}-windows.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-windows
          path: |
            dist/Harmony-*.exe
            dist/Harmony-*.zip
          retention-days: 30

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.AppImage" -exec cp {} release-assets/ \;
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          find artifacts -name "*.exe" -exec cp {} release-assets/ \;
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
